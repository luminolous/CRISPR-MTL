# configs/config.yaml
# Central configuration for CRISPR-MTL
# All hyperparameters and paths are defined here.
# Never hardcode values in src/ files — always reference this config.

# PATHS
paths:
  # Input data
  ontarget_csv:     "data/on-target/Supplementary File1.csv"
  offtarget_dc:     "data/off-target/eg_cls_off_target.epiotrt"
  offtarget_lg:     "data/off-target/listgarten_elevation_hmg.pkl"

  # Processed data (generated by dataset.py)
  processed_dir:    "data/processed"
  cv_splits:        "data/processed/cv_splits.pkl"
  ontarget_clean:   "data/processed/ontarget_clean.csv"
  offtarget_merged: "data/processed/offtarget_merged.csv"

  # Outputs
  checkpoints_dir:  "outputs/checkpoints"
  results_dir:      "outputs/results"
  figures_dir:      "outputs/figures"
  results_csv:      "outputs/results/results_table.csv"
  summary_csv:      "outputs/results/summary_table.csv"

# DATA PREPROCESSING
data:
  kmer_k:           6           # k-mer size for DNABERT tokenization
  grna_length:      23          # expected gRNA length (20nt + 3nt PAM)
  seq_start_idx:    4           # start index for extracting 23-mer from 30mer
  seq_end_idx:      27          # end index for extracting 23-mer from 30mer
  valid_nucleotides: "ATGC"    # reject sequences with other characters

# MODEL
model:
  # DNABERT backbone
  dnabert_name:     "zhihan1996/DNA_bert_6"
  dnabert_hidden:   768         # DNABERT hidden dimension
  freeze_layers:    8           # number of DNABERT layers to always freeze (1-8)

  # Shared projection head
  projection_dim:   256         # DNABERT_hidden → projection_dim
  projection_dropout: 0.1

  # Task-specific heads
  head_hidden:      64          # projection_dim → head_hidden → 1
  head_dropout_ontarget:  0.2
  head_dropout_offtarget: 0.3  # higher due to smaller + imbalanced off-target data

  # Tokenizer max lengths
  max_length_ontarget:  30     # [CLS] + 18 tokens + [SEP] = 20, padded to 30
  max_length_offtarget: 50     # [CLS] + 18 + [SEP] + 18 + [SEP] = 38, padded to 50

# TRAINING — SHARED ACROSS ALL EXPERIMENTS
training:
  seed:             42
  n_folds:          5
  device:           "auto"      # "auto" = use GPU if available, else CPU

  # Batch sizes
  batch_size_ontarget:  32
  batch_size_offtarget: 16      # smaller due to off-target dataset size

  # Optimizer
  optimizer:        "AdamW"
  weight_decay:     0.01
  gradient_clip:    1.0         # max gradient norm for clipping

  # Mixed precision
  use_fp16:         true        # set to false if GPU doesn't support it

  # Early stopping
  early_stopping_patience: 10
  min_delta:        0.001       # minimum improvement to count as progress

  # Checkpoint saving
  save_every_fold:  true        # save best checkpoint for every fold

# TRAINING — BASELINE MODELS (A1, A2)
baseline:
  epochs:           50
  lr:               0.001
  lstm_hidden:      128
  lstm_layers:      2
  cnn_filters:      64
  cnn_kernel:       3

# TRAINING — DNABERT SINGLE TASK (B1, B2)
dnabert_single:
  epochs_total:     30
  warmup_epochs:    5           # Phase 1: all DNABERT frozen
  lr_head:          0.0001      # learning rate for projection + head
  lr_dnabert:       0.00001     # learning rate for fine-tuned DNABERT layers (10x smaller)

# TRAINING — MTL FULL MODEL (MTL-Full)
mtl:
  epochs_total:     30
  warmup_epochs:    5           # Phase 1: all DNABERT frozen
  lr_head:          0.0001      # learning rate for projection + both heads
  lr_dnabert:       0.00001     # learning rate for fine-tuned DNABERT layers
  scheduler:        "ReduceLROnPlateau"
  scheduler_patience: 5
  scheduler_factor: 0.5

# TRAINING — ABLATION VARIANTS
ablation:
  # ABL1: frozen all — same as MTL but no layer unfreezing
  abl1_freeze_strategy: "freeze_all"

  # ABL2: unfreeze all — fine-tune all DNABERT layers
  abl2_freeze_strategy: "unfreeze_all"
  abl2_lr_dnabert_early: 0.000001  # extra small LR for early layers (1-8)

  # ABL3: combined loss instead of alternating
  abl3_alpha:       0.5         # L_total = alpha * L_on + (1-alpha) * L_off

# LOSS FUNCTIONS
loss:
  ontarget_loss:    "mse"       # mean squared error for regression
  offtarget_loss:   "bce"       # binary cross-entropy for classification
  # class weight for off-target: computed dynamically as n_negative / n_positive

# EVALUATION
evaluation:
  # Metrics
  primary_ontarget:   "spearman"
  secondary_ontarget: "pearson"
  primary_offtarget:  "auroc"
  secondary_offtarget: "aupr"

  # Checkpoint selection criterion
  # best fold = argmax(normalized_spearman + normalized_auroc)
  checkpoint_metric: "combined"

# INTERPRETABILITY
interpretability:
  n_steps:          50          # number of Riemann steps for Integrated Gradients
  baseline_type:    "zero"      # zero embeddings as attribution baseline
  n_samples_head1:  20          # 10 high efficiency + 10 low efficiency gRNAs
  n_samples_head2:  20          # 10 positive + 10 negative off-target pairs
  seed_region_start: 12         # seed region start position (0-indexed, from 5' end)
  seed_region_end:   20         # seed region end position (exclusive)

# EXPERIMENT IDs
# Used for naming checkpoints and result rows
experiments:
  - id: "A1"
    description: "BiLSTM from scratch, on-target only"
    model_type: "bilstm_baseline"
    task: "ontarget"

  - id: "A2"
    description: "CNN-BiLSTM from scratch, off-target only"
    model_type: "cnn_bilstm_baseline"
    task: "offtarget"

  - id: "B1"
    description: "DNABERT single-task, on-target only"
    model_type: "dnabert_single"
    task: "ontarget"

  - id: "B2"
    description: "DNABERT single-task, off-target only"
    model_type: "dnabert_single"
    task: "offtarget"

  - id: "MTL-Full"
    description: "CRISPR-MTL full model — main contribution"
    model_type: "crispr_mtl"
    task: "both"

  - id: "ABL1"
    description: "Ablation: freeze all DNABERT layers"
    model_type: "crispr_mtl"
    task: "both"
    ablation: "freeze_all"

  - id: "ABL2"
    description: "Ablation: unfreeze all DNABERT layers"
    model_type: "crispr_mtl"
    task: "both"
    ablation: "unfreeze_all"

  - id: "ABL3"
    description: "Ablation: combined loss instead of alternating"
    model_type: "crispr_mtl"
    task: "both"
    ablation: "combined_loss"